<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PARABOOM - Ular Tangga Fisika</title>
  <style>
    :root {
      --bg: #E8F5F9;
      --panel: #153E61;
      --panel-soft: #1C5D7B;
      --text: #0F172A;
      --card: #EFF6FF;
      --accent: #F97316;
      --light: #D9F2FD;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, sans-serif;
      background: radial-gradient(circle at top, #d5f0f9 0%, #bedee8 35%, #accad2 100%);
      color: var(--text);
      display: flex;
      justify-content: center;
      padding: 24px;
    }
    .page {
      width: min(1180px, 100%);
      display: grid;
      gap: 24px;
    }
    header {
      text-align: center;
    }
    .title {
      display: inline-flex;
      padding: 14px 28px;
      background: var(--panel);
      color: white;
      border-radius: 20px;
      font-size: clamp(2rem, 3vw, 3.5rem);
      letter-spacing: 0.08em;
      text-transform: uppercase;
      box-shadow: 0 18px 40px rgba(18, 52, 76, 0.24);
    }
    .subtitle {
      margin: 18px auto 0;
      max-width: 760px;
      color: #334155;
      font-size: 1rem;
      line-height: 1.8;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.5fr) minmax(320px, 430px);
      gap: 24px;
      align-items: start;
    }
    .board-frame {
      max-width: 680px;
      margin: 0 auto;
      background: linear-gradient(180deg, rgba(255,255,255,0.9), rgba(233,244,249,0.95));
      border: 12px solid #AED9EB;
      border-radius: 40px;
      padding: 20px;
      box-shadow: 0 30px 70px rgba(15, 23, 42, 0.18);
    }
    .board-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 8px;
    }
    .cell {
      min-height: 90px;
      border-radius: 20px;
      position: relative;
      padding: 8px;
      overflow: hidden;
      border: 2px solid transparent;
      display: grid;
      grid-template-rows: auto 1fr;
      justify-items: center;
      align-items: center;
      text-align: center;
      background: #f8fcff;
      transition: transform 0.15s ease;
    }
    .cell:hover { transform: translateY(-2px); }
    .cell.special { border-color: rgba(249,115,22,0.32); background: #ebf9ff; }
    .cell.start, .cell.finish { background: #d0f5ff; }
    .cell-number {
      position: absolute;
      top: 12px;
      left: 12px;
      font-size: 0.85rem;
      font-weight: 700;
      color: #475569;
    }
    .cell-icon {
      font-size: 1.6rem;
      line-height: 1;
    }
    .cell-label {
      margin-top: 4px;
      font-size: 0.78rem;
      color: #334155;
      font-weight: 600;
    }
    .player-marker {
      position: absolute;
      bottom: 6px;
      right: 6px;
      display: flex;
      gap: 6px;
    }
    .marker {
      width: 20px;
      height: 20px;
      border-radius: 999px;
      display: grid;
      place-items: center;
      font-size: 0.75rem;
      font-weight: 700;
      color: white;
      border: 2px solid #fff;
    }
    .marker.p1 { background: #f97316; }
    .marker.p2 { background: #2563eb; }
    .panel-list {
      display: grid;
      gap: 18px;
    }
    .panel {
      background: rgba(255,255,255,0.88);
      border-radius: 24px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      padding: 20px;
      box-shadow: 0 18px 30px rgba(15, 23, 42, 0.08);
    }
    .panel h2 {
      margin: 0 0 14px;
      font-size: 1.05rem;
      color: #0f172a;
    }
    .stats {
      display: grid;
      gap: 12px;
    }
    .stat-box {
      background: var(--light);
      border-radius: 18px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      color: #0f172a;
      font-weight: 700;
    }
    .name-row {
      display: grid;
      gap: 12px;
      margin-bottom: 16px;
    }
    .name-input {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: var(--light);
      border-radius: 18px;
      padding: 14px 16px;
    }
    .name-input label {
      font-size: 0.95rem;
      font-weight: 700;
      color: #0f172a;
    }
    .name-input input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 14px;
      background: white;
      color: #0f172a;
      font-size: 0.95rem;
    }
    .stat-small { color: #334155; font-size: 0.9rem; font-weight: 500; }
    .button { width: 100%; border: none; border-radius: 18px; background: linear-gradient(135deg, #0ea5e9, #0284c7); color: white; font-size: 1rem; font-weight: 700; padding: 16px; cursor: pointer; transition: transform 0.18s ease, filter 0.18s ease; }
    .button:hover { filter: brightness(1.05); transform: translateY(-1px); }
    .button:disabled { opacity: 0.55; cursor: not-allowed; transform: none; }
    .log { max-height: 320px; overflow-y: auto; display: grid; gap: 12px; padding-right: 4px; }
    .log-entry { background: #eaf7ff; color: #0f172a; padding: 12px 14px; border-radius: 16px; border: 1px solid rgba(15,23,42,0.08); }
    .modal-backdrop { position: fixed; inset: 0; display: none; align-items: center; justify-content: center; background: rgba(15,23,42,0.75); z-index: 50; padding: 24px; }
    .modal { width: min(520px, 100%); border-radius: 24px; background: white; padding: 24px; box-shadow: 0 30px 70px rgba(15,23,42,0.22); border: 1px solid rgba(15,23,42,0.08); }
    .modal h3 { margin: 0 0 16px; font-size: 1.2rem; color: #0f172a; }
    .modal p { margin: 0 0 18px; color: #334155; line-height: 1.7; }
    .modal input { width: 100%; padding: 14px 16px; border-radius: 16px; border: 1px solid #cbd5e1; background: #f8fafc; color: #0f172a; margin-bottom: 18px; }
    .modal-buttons { display: grid; gap: 12px; }
    .badge { display: inline-flex; gap: 8px; align-items: center; background: rgba(14,165,233,0.12); color: #0369a1; padding: 10px 14px; border-radius: 999px; font-weight: 700; }
    @media (max-width: 900px) {
      .board-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .layout { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <header>
      <div class="title">PARABOOM</div>
      <p class="subtitle">Desain game board seperti jalur ular tangga dengan kotak BOOM, TANTANGAN, MERIAM, PEROSOTAN, dan LAMPU FAKTA.</p>
    </header>
    <div class="layout">
      <section class="board-frame">
        <div class="board-grid" id="boardGrid"></div>
      </section>
      <div class="panel-list">
      <section class="panel">
        <h2>Nama Pemain</h2>
        <div class="name-row">
          <div class="name-input">
            <label for="playerName1">Pemain 1</label>
            <input id="playerName1" type="text" value="Pemain 1" oninput="updatePlayerName(0, this.value)" />
          </div>
          <div class="name-input">
            <label for="playerName2">Pemain 2</label>
            <input id="playerName2" type="text" value="Pemain 2" oninput="updatePlayerName(1, this.value)" />
          </div>
        </div>
      </section>
      <section class="panel">
        <h2>Status Pemain</h2>
        <div class="stats">
          <div class="stat-box"><span id="playerLabel1">Pemain 1</span><span class="stat-small">Posisi: <span id="pos1">START</span></span></div>
          <div class="stat-box"><span id="playerLabel2">Pemain 2</span><span class="stat-small">Posisi: <span id="pos2">START</span></span></div>
          <div class="stat-box"><span>Giliran</span><span class="stat-small" id="currentPlayer">Pemain 1</span></div>
          <div class="stat-box"><span>Dadu</span><span class="stat-small" id="diceValue">-</span></div>
        </div>
        <button class="button" id="rollButton">Lempar Dadu</button>
      </section>
      <section class="panel">
        <h2>Log Permainan</h2>
        <div class="log" id="gameLog"></div>
      </section>
    </div>
  </div>
  <div class="modal-backdrop" id="modalBackdrop">
    <div class="modal" id="modal">
      <h3 id="modalTitle">Judul</h3>
      <p id="modalMessage">Isi dialog</p>
      <input id="modalInput" type="text" placeholder="Jawaban Anda" />
      <div class="modal-buttons" id="modalButtons"></div>
    </div>
  </div>
  <script>
    const boardData = Array.from({ length: 48 }, (_, index) => ({ number: index + 1, title: 'Normal', icon: '▫️' }));
    const specialSquares = {
      1: { title: 'START', icon: '🏁', type: 'start' },
      48: { title: 'FINISH', icon: '🏁', type: 'finish' },
      2: { title: 'BOOM', icon: '💣', type: 'boom' },
      3: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      5: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      6: { title: 'MERIAM', icon: '🚀', type: 'cannon', target: 12 },
      7: { title: 'BOOM', icon: '💣', type: 'boom' },
      8: { title: 'LAMP', icon: '💡', type: 'lamp' },
      10: { title: 'PEROSOTAN', icon: '🪜', type: 'slide', target: 4 },
      11: { title: 'BOOM', icon: '💣', type: 'boom' },
      13: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      14: { title: 'BOOM', icon: '💣', type: 'boom' },
      15: { title: 'LAMP', icon: '💡', type: 'lamp' },
      17: { title: 'MERIAM', icon: '🚀', type: 'cannon', target: 21 },
      19: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      22: { title: 'LAMP', icon: '💡', type: 'lamp' },
      23: { title: 'BOOM', icon: '💣', type: 'boom' },
      25: { title: 'BOOM', icon: '💣', type: 'boom' },
      26: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      28: { title: 'PEROSOTAN', icon: '🪜', type: 'slide', target: 23 },
      29: { title: 'BOOM', icon: '💣', type: 'boom' },
      30: { title: 'MERIAM', icon: '🚀', type: 'cannon', target: 42 },
      32: { title: 'LAMP', icon: '💡', type: 'lamp' },
      33: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      35: { title: 'BOOM', icon: '💣', type: 'boom' },
      36: { title: 'BOOM', icon: '💣', type: 'boom' },
      38: { title: 'PEROSOTAN', icon: '🪜', type: 'slide', target: 31 },
      39: { title: 'BOOM', icon: '💣', type: 'boom' },
      40: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      42: { title: 'LAMP', icon: '💡', type: 'lamp' },
      43: { title: 'BOOM', icon: '💣', type: 'boom' },
      44: { title: 'TANTANGAN', icon: '🏋️', type: 'challenge' },
      46: { title: 'BOOM', icon: '💣', type: 'boom' }
    };
    Object.entries(specialSquares).forEach(([number, info]) => {
      boardData[number - 1] = { number: +number, ...info };
    });
    const boomQuestions = [
      { question: 'Satu prinsip penting saat menghadapi BOOM adalah apa? (jawab "keselamatan")', answer: 'keselamatan' },
      { question: 'Jika dadu menunjukkan 5, berapa langkah maju yang harus ditempuh?', answer: '5' },
      { question: 'Jika lintasan proyektil melengkung, gerak ini disebut apa?', answer: 'parabola' }
    ];
    const challengeQuestions = [
      { question: 'Komponen kecepatan horizontal pada gerak parabola tetap atau berubah? (jawab "tetap")', answer: 'tetap' },
      { question: 'Apa nama titik tertinggi pada lintasan parabola? (jawab "puncak")', answer: 'puncak' },
      { question: 'Pada sudut 45°, apakah jangkauan biasanya maksimum? (jawab "ya")', answer: 'ya' }
    ];
    const lampFacts = [
      'Fakta: Gerak parabola terdiri dari gerak horizontal tetap dan gerak vertikal berubah.',
      'Fakta: Titik tertinggi parabola disebut puncak.',
      'Fakta: Di gerak parabola, gravitasi selalu menarik benda ke bawah.'
    ];
    const players = [
      { name: 'Pemain 1', position: 1, color: 'p1' },
      { name: 'Pemain 2', position: 1, color: 'p2' }
    ];
    let currentPlayer = 0;
    function updatePlayerName(index, value) {
      players[index].name = value.trim() || `Pemain ${index + 1}`;
      document.getElementById(`playerLabel${index + 1}`).textContent = players[index].name;
      if (currentPlayer === index) {
        document.getElementById('currentPlayer').textContent = players[index].name;
      }
    }
    let gameEnded = false;
    const modalBackdrop = document.getElementById('modalBackdrop');
    const modalTitle = document.getElementById('modalTitle');
    const modalMessage = document.getElementById('modalMessage');
    const modalButtons = document.getElementById('modalButtons');
    const modalInput = document.getElementById('modalInput');
    function createBoard() {
      const grid = document.getElementById('boardGrid');
      grid.innerHTML = '';
      boardData.slice().reverse().forEach(cell => {
        const node = document.createElement('div');
        node.className = 'cell';
        if (cell.type) node.classList.add('special');
        if (cell.type === 'start') node.classList.add('start');
        if (cell.type === 'finish') node.classList.add('finish');
        node.innerHTML = `
          <div class="cell-number">${cell.number}</div>
          <div class="cell-icon">${cell.icon}</div>
          <div class="cell-label">${cell.title}</div>
          <div class="player-marker" id="cell-${cell.number}-markers"></div>
        `;
        grid.append(node);
      });
    }
    function renderPlayers() {
      document.getElementById('pos1').textContent = positionLabel(players[0].position);
      document.getElementById('pos2').textContent = positionLabel(players[1].position);
      document.getElementById('playerLabel1').textContent = players[0].name;
      document.getElementById('playerLabel2').textContent = players[1].name;
      document.getElementById('currentPlayer').textContent = players[currentPlayer].name;
      boardData.forEach(cell => {
        const container = document.getElementById(`cell-${cell.number}-markers`);
        container.innerHTML = '';
      });
      players.forEach((player, index) => {
        const marker = document.createElement('div');
        marker.className = `marker ${player.color}`;
        marker.textContent = index + 1;
        const target = document.getElementById(`cell-${player.position}-markers`);
        if (target) target.append(marker);
      });
    }
    function positionLabel(pos) {
      const cell = boardData.find(item => item.number === pos);
      if (!cell) return pos;
      if (cell.type === 'start') return 'START';
      if (cell.type === 'finish') return 'FINISH';
      return pos;
    }
    function addLog(message) {
      const log = document.getElementById('gameLog');
      const entry = document.createElement('div');
      entry.className = 'log-entry';
      entry.textContent = message;
      log.prepend(entry);
    }
    function openModal(title, message, buttons = []) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalButtons.innerHTML = '';
      modalInput.style.display = 'none';
      modalInput.value = '';
      buttons.forEach(btn => {
        const element = document.createElement('button');
        element.className = 'button';
        element.textContent = btn.label;
        element.addEventListener('click', () => btn.onClick());
        modalButtons.append(element);
      });
      modalBackdrop.style.display = 'flex';
    }
    function openQuestionModal(title, message, onSubmit) {
      modalTitle.textContent = title;
      modalMessage.textContent = message;
      modalInput.style.display = 'block';
      modalInput.value = '';
      modalInput.focus();
      modalButtons.innerHTML = '';
      const submit = document.createElement('button');
      submit.className = 'button';
      submit.textContent = 'Kirim Jawaban';
      submit.addEventListener('click', () => {
        const answer = modalInput.value.trim();
        if (!answer) return;
        onSubmit(answer);
      });
      const cancel = document.createElement('button');
      cancel.className = 'button';
      cancel.textContent = 'Batal';
      cancel.addEventListener('click', closeModal);
      modalButtons.append(submit, cancel);
      modalBackdrop.style.display = 'flex';
    }
    function closeModal() {
      modalBackdrop.style.display = 'none';
      modalInput.style.display = 'none';
      modalButtons.innerHTML = '';
    }
    function rollDice() {
      if (gameEnded) return;
      const dice = Math.floor(Math.random() * 6) + 1;
      document.getElementById('diceValue').textContent = dice;
      const player = players[currentPlayer];
      let newPosition = player.position + dice;
      if (newPosition >= 48) newPosition = 48;
      addLog(`${player.name} melempar dadu: ${dice}. Dari ${player.position} ke ${newPosition}.`);
      player.position = newPosition;
      renderPlayers();
      const square = boardData.find(item => item.number === player.position);
      if (square && square.type && square.type !== 'start' && square.type !== 'finish') {
        handleSpecialSquare(square);
      } else {
        finishTurn();
      }
    }
    function handleSpecialSquare(square) {
      const opponentIndex = 1 - currentPlayer;
      const opponent = players[opponentIndex];
      let effectMoved = false;
      if (square.type === 'boom') {
        const card = boomQuestions[Math.floor(Math.random() * boomQuestions.length)];
        openQuestionModal('BOOM! Ambil Kartu BOOM', `Soal: ${card.question}`, answer => {
          const correct = answer.toLowerCase() === card.answer.toLowerCase();
          if (correct) {
            players[currentPlayer].position = Math.min(48, players[currentPlayer].position + 2);
            addLog(`${players[currentPlayer].name} benar! Maju 2 langkah ke ${players[currentPlayer].position}.`);
          } else {
            players[currentPlayer].position = Math.max(1, players[currentPlayer].position - 1);
            addLog(`${players[currentPlayer].name} salah! Mundur 1 langkah ke ${players[currentPlayer].position}.`);
          }
          renderPlayers();
          effectMoved = true;
          closeModal();
          finishTurn(effectMoved);
        });
      }
      if (square.type === 'challenge') {
        openModal('TANTANGAN!', 'Pilih opsi:', [
          { label: 'Jawab sendiri', onClick: () => {
            closeModal();
            const card = challengeQuestions[Math.floor(Math.random() * challengeQuestions.length)];
            openQuestionModal('Tantangan Sendiri', `Soal: ${card.question}`, answer => {
              const correct = answer.toLowerCase() === card.answer.toLowerCase();
              if (correct) {
                players[currentPlayer].position = Math.min(48, players[currentPlayer].position + 2);
                addLog(`${players[currentPlayer].name} benar! Maju 2 langkah ke ${players[currentPlayer].position}.`);
              } else {
                players[currentPlayer].position = Math.max(1, players[currentPlayer].position - 1);
                addLog(`${players[currentPlayer].name} salah! Mundur 1 langkah ke ${players[currentPlayer].position}.`);
              }
              renderPlayers();
              effectMoved = true;
              closeModal();
              finishTurn(effectMoved);
            });
          }},
          { label: 'Lempar ke lawan', onClick: () => {
            closeModal();
            const card = challengeQuestions[Math.floor(Math.random() * challengeQuestions.length)];
            openQuestionModal('Tantangan untuk lawan', `Soal: ${card.question}`, answer => {
              const correct = answer.toLowerCase() === card.answer.toLowerCase();
              if (correct) {
                opponent.position = Math.min(48, opponent.position + 2);
                players[currentPlayer].position = Math.max(1, players[currentPlayer].position - 1);
                addLog(`${opponent.name} benar! Mereka maju 2, kamu mundur 1.`);
              } else {
                players[currentPlayer].position = Math.min(48, players[currentPlayer].position + 2);
                opponent.position = Math.max(1, opponent.position - 1);
                addLog(`${opponent.name} salah! Kamu maju 2, mereka mundur 1.`);
              }
              renderPlayers();
              effectMoved = true;
              closeModal();
              finishTurn(effectMoved);
            });
          }}
        ]);
      }
      if (square.type === 'lamp') {
        const fact = lampFacts[Math.floor(Math.random() * lampFacts.length)];
        openModal('LAMP', fact, [
          { label: 'OK', onClick: () => {
            addLog(`${players[currentPlayer].name} membaca fakta: ${fact}`);
            closeModal();
            finishTurn();
          }}
        ]);
      }
      if (square.type === 'cannon') {
        players[currentPlayer].position = square.target;
        addLog(`${players[currentPlayer].name} naik MERIAM ke ${square.target}.`);
        renderPlayers();
        finishTurn();
      }
      if (square.type === 'slide') {
        players[currentPlayer].position = square.target;
        addLog(`${players[currentPlayer].name} turun PEROSOTAN ke ${square.target}.`);
        renderPlayers();
        finishTurn();
      }
    }
    function finishTurn(effectMoved = false) {
      if (players[currentPlayer].position >= 48) {
        gameEnded = true;
        addLog(`${players[currentPlayer].name} mencapai FINISH dan menang! 🎉`);
        document.getElementById('rollButton').disabled = true;
        closeModal();
        return;
      }
      currentPlayer = 1 - currentPlayer;
      addLog(`Giliran berpindah ke ${players[currentPlayer].name}.`);
      renderPlayers();
    }
    document.getElementById('rollButton').addEventListener('click', rollDice);
    modalBackdrop.addEventListener('click', event => { if (event.target === modalBackdrop) closeModal(); });
    createBoard();
    renderPlayers();
    addLog('Game dimulai! Tekan lempar dadu untuk mulai.');
  </script>
</body>
</html>
